<style>
.subscribe-button {
  background-color: rgb(200,0,0);
   /* Green */
  border: none;
  color: white;
  
  cursor: pointer;
  margin-right: 10px;
  transition: background-color 1.0s ease;
  padding: 10px 20px;
  vertical-align: top;
}
.subscribe-button:hover {
   /* background-color: green; */
   opacity: 0.8;
}
.subscribe-button:active {
 /* background-color: blue;*/
  opacity: 0.5;
}
.join-button {
  background-color: white;
   /* Green */
   border-width: 2px;
   border-style: solid;
   border-color: blue;
   border-radius: 4px;
  color: blue;
  height: 36px;
  width: 62px;
  cursor: pointer;
  margin-right: 10px;
  font-weight: bold;
  vertical-align: top;
  padding: 10px 20px;
}
.join-button:hover {
    background-color: blue; 
    opacity: 0.8;
    color: white;
}
.join-button:active {
    background-color: blue; 
    opacity: 0.5;
    color: white;
}
.tweet-button {
  background-color: rgb(0,200,0);
  border-radius: 18px;
   /* Green */
  border: none;
  color: white;
  height: 36px;
  width: 70px;
  cursor: pointer;
  font-weight: bold;
  font-size: 15px;
  vertical-align: top;
  transition: background-color 1.0s ease;
  padding: 10px 20px;
}
.tweet-button:hover {
   box-shadow: 10px 10px 0px rgba(0, 0, 0, 0.1);
   transition: background-color 1.0s ease;
   opacity: 0.8;
}
</style>
<button class="subscribe-button">SUBSCRIBE</button>
<button class="join-button">JOIN</button>
<button class="tweet-button">Tweet</button>
