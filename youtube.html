<!doctype html>
<html>
  <head> </head>
  <title>YouuuTube.com Clone</title>
  <style>
    .thumbnail {
      width: 300px;
      display: block;
      margin-bottom: 20px;
      /* height: 300px;
      object-fit: contain;
      object-position: bottom;
      border-width: 2px;
      border-style: solid;
      border-color: red;*/
    }
    .search-bar {
      /* font-size: 20px;
      margin-left: 12px;*/
      display: block;
    }
    .video-title {
      margin-top: 0;
    }
    .video-preview {
      width: 300px;
      display: inline-block;
      vertical-align: top;
      margin-right: 15px;
    }
    .channel-picture {
      display: inline-block;
      width: 50px;
      vertical-align: top;
    }
    .video-info {
      display: inline-block;
      width: 200px;
    }
    .profile-picture {
      width: 40px;
      vertical-align: top;
      border-radius: 50px;
    }
    .thumbnail-row {
      margin-bottom: 12px;
    }
  </style>

  <body>
    <input class="search-bar" type="text" placeholder="Search" />
    <div class="video-preview">
      <div>
        <img class="thumbnail" src="thumbnail/thumbnail-1" />
      </div>
      <div>
        <div class="channel-pictures">
          <img class="profile-picture" src="channel-pictures/channel-1.jpeg" />
          <div class="video-info">
            <p class="video-title">
              Talking Tech and AI with Google CEO Sundar Pichai!
            </p>
            <p class="video-author">Marques Brownlee</p>
            <p class="video-stats">3.4M views &#183; 4 years ago</p>
          </div>
        </div>
      </div>
    </div>

    <div class="video-preview">
      <img class="thumbnail" src="thumbnail/thumbnail-2.webp" />
      <p class="video-title">Try Not To Laugh Challenge #9</p>
      <p class="video-author">Markiplier</p>
      <p class="video-stats">19M views &#183; 4 years ago</p>
    </div>
  </body>
</html>
